<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistikalar Boshqaruvi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <main class="fade-in">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Statistikalar Boshqaruvi</h1>
                <p class="text-gray-500 mt-1">Saytning bosh sahifasidagi asosiy ko'rsatkichlarni tahrirlash</p>
            </div>
            <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-blue-700 shadow-md transition-all flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Yangi Statistika
            </button>
        </div>

        <div id="stats-container" class="space-y-6">
            <!-- Dynamic Content Loading... -->
        </div>

        <!-- Modal -->
        <div id="stat-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
                <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h2 id="modal-title" class="text-2xl font-bold text-gray-800">Statistikani Tahrirlash</h2>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <form id="stat-form" class="p-8 space-y-6 max-h-[70vh] overflow-y-auto">
                    <input type="hidden" id="stat-id">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="hero-hide">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Unikal Kalit (key)</label>
                            <input type="text" id="stat-key" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Qiymat (Value)</label>
                            <input type="text" id="stat-value" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
                        </div>
                    </div>

                    <div class="space-y-4 hero-hide">
                        <p class="font-bold text-gray-800 border-b pb-2">Sarlavhalar (Labels)</p>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">O'zbekcha</label>
                                <input type="text" id="stat-label-uz" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Ruscha</label>
                                <input type="text" id="stat-label-ru" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Inglizcha</label>
                                <input type="text" id="stat-label-en" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 outline-none">
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4 hero-hide">
                        <p class="font-bold text-gray-800 border-b pb-2">Tavsiflar (Descriptions)</p>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">O'zbekcha</label>
                                <textarea id="stat-desc-uz" rows="2" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 outline-none"></textarea>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Ruscha</label>
                                <textarea id="stat-desc-ru" rows="2" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 outline-none"></textarea>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Inglizcha</label>
                                <textarea id="stat-desc-en" rows="2" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 outline-none"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                        <div class="hero-hide">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Bo'lim (Section)</label>
                            <select id="stat-section" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 outline-none bg-white">
                                <option value="home_achievements">🏆 Yutuqlar (Achievements)</option>
                                <option value="home_top">🏠 Hero Stats</option>
                                <option value="other">Boshqa</option>
                            </select>
                        </div>
                        <div class="hero-hide">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Tartib (Order)</label>
                            <input type="number" id="stat-order" value="0" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 outline-none">
                        </div>
                        <div class="flex items-center space-x-3 pb-3 hero-hide">
                            <input type="checkbox" id="stat-active" class="w-6 h-6 rounded border-gray-300 text-blue-600 focus:ring-blue-500" checked>
                            <label for="stat-active" class="text-sm font-bold text-gray-700 uppercase">Aktiv</label>
                        </div>
                    </div>

                    <div class="flex justify-end space-x-4 pt-6 border-t">
                        <button type="button" onclick="closeModal()" class="px-6 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-100 transition-all">Bekor qilish</button>
                        <button type="submit" class="px-10 py-3 rounded-xl font-bold bg-blue-600 text-white hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">Saqlash</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/admin.js"></script>
    <script src="js/stats.js"></script>
</body>

</html>
