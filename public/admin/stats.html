<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistikalar Boshqaruvi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <main class="fade-in">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Statistikalar Boshqaruvi</h1>
            <p class="text-gray-500 mt-1">Saytning bosh sahifasidagi asosiy ko'rsatkichlarni tahrirlash</p>
        </div>

        <form id="stats-form"
            class="bg-white p-8 rounded-3xl shadow-lg border border-gray-100 max-w-4xl space-y-8 relative overflow-hidden">
            <!-- Decorative shadow detail -->
            <div
                class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 rounded-full bg-gradient-to-br from-blue-50 to-indigo-50/30 blur-3xl -z-10 pointer-events-none">
            </div>

            <div class="bg-blue-50 border-l-4 border-blue-500 p-5 rounded-r-xl">
                <div class="flex items-start">
                    <div class="flex-shrink-0 mt-0.5">
                        <svg class="h-5 w-5 text-blue-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3">
                        <h3 class="text-sm font-medium text-blue-800">Eslatma</h3>
                        <p class="mt-1 text-sm text-blue-700">"Sohalar soni" avtomatik hisoblanadi (qo'shilgan sohalar
                            bo'yicha). Qolganlarini o'zgartirishingiz mumkin.</p>
                    </div>
                </div>
            </div>

            <div id="stats-container" class="space-y-6">
                <!-- Dynamic Content Loading... -->
                <div class="animate-pulse flex space-x-4">
                    <div class="flex-1 space-y-4 py-1">
                        <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                        <div class="space-y-2">
                            <div class="h-4 bg-gray-200 rounded"></div>
                            <div class="h-4 bg-gray-200 rounded w-5/6"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between pt-6 border-t border-gray-100">
                <p id="message" class="text-emerald-600 font-bold hidden bg-emerald-50 px-4 py-2 rounded-lg"></p>
                <button type="submit" id="submit-btn"
                    class="ml-auto bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5">
                    Saqlash
                </button>
            </div>
        </form>
    </main>

    <script src="js/admin.js"></script>
    <script src="js/stats.js"></script>
</body>

</html>
