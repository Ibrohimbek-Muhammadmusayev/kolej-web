<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yo'nalishlar Boshqaruvi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <main class="fade-in">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Yo'nalishlar (Sohalar)</h1>
                <p class="text-gray-500 mt-1">O'qitiladigan kasb-hunar yo'nalishlarini boshqarish</p>
            </div>
            <button onclick="openModal()"
                class="bg-blue-600 text-white px-5 py-2.5 rounded-xl hover:bg-blue-700 font-bold shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 flex items-center space-x-2">
                <span class="text-xl">+</span>
                <span>Yangi Qo'shish</span>
            </button>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr
                            class="bg-gray-50/50 border-b border-gray-100 text-xs uppercase tracking-wider text-gray-500 font-semibold">
                            <th class="p-5 w-16 text-center">ID</th>
                            <th class="p-5">Nomi (UZ)</th>
                            <th class="p-5">Slug</th>
                            <th class="p-5 w-20 text-center">Tartib</th>
                            <th class="p-5 w-24 text-center">Yangi?</th>
                            <th class="p-5 text-right w-32">Amallar</th>
                        </tr>
                    </thead>
                    <tbody id="fields-table-body" class="divide-y divide-gray-50 text-sm text-gray-700">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal"
        class="fixed inset-0 bg-gray-900/60 hidden z-50 flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl w-full max-w-4xl max-h-[90vh] shadow-2xl overflow-hidden flex flex-col transform transition-all scale-95 opacity-0"
            id="modal-content">
            <div class="px-8 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <div>
                    <h2 id="modal-title" class="text-2xl font-bold text-gray-800">Yo'nalish qo'shish</h2>
                    <p class="text-sm text-gray-500 mt-1">Yo'nalish ma'lumotlarini barcha tillar uchun kiriting</p>
                </div>
                <button onclick="closeModal()"
                    class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-200 hover:bg-gray-300 text-gray-600 transition-colors">
                    &times;
                </button>
            </div>

            <div class="p-8 overflow-y-auto flex-1">
                <form id="field-form" class="space-y-6">
                    <input type="hidden" id="field-id">

                    <!-- Language Tabs -->
                    <div class="flex p-1 bg-gray-100 rounded-xl mb-6">
                        <button type="button" onclick="switchTab('uz')" id="tab-btn-uz"
                            class="flex-1 py-2.5 rounded-lg font-bold text-sm transition-all bg-white text-blue-600 shadow-sm">O'zbekcha</button>
                        <button type="button" onclick="switchTab('ru')" id="tab-btn-ru"
                            class="flex-1 py-2.5 rounded-lg font-medium text-sm transition-all text-gray-500 hover:text-gray-700 hover:bg-gray-200/50">Ruscha</button>
                        <button type="button" onclick="switchTab('en')" id="tab-btn-en"
                            class="flex-1 py-2.5 rounded-lg font-medium text-sm transition-all text-gray-500 hover:text-gray-700 hover:bg-gray-200/50">Inglizcha</button>
                    </div>

                    <!-- UZ Fields -->
                    <div id="tab-uz" class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nomi (UZ)</label>
                            <input type="text" id="title_uz"
                                class="w-full px-4 py-3 rounded-xl bg-gray-50 border-transparent focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 transition-all font-medium"
                                required oninput="generateSlug(this.value)">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Tavsif (UZ)</label>
                            <textarea id="description_uz"
                                class="w-full px-4 py-3 rounded-xl bg-gray-50 border-transparent focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 transition-all h-24 resize-none leading-relaxed"
                                required></textarea>
                        </div>
                    </div>

                    <!-- RU Fields -->
                    <div id="tab-ru" class="space-y-5 hidden">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nomi (RU)</label>
                            <input type="text" id="title_ru"
                                class="w-full px-4 py-3 rounded-xl bg-gray-50 border-transparent focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 transition-all font-medium">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Tavsif (RU)</label>
                            <textarea id="description_ru"
                                class="w-full px-4 py-3 rounded-xl bg-gray-50 border-transparent focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 transition-all h-24 resize-none leading-relaxed"></textarea>
                        </div>
                    </div>

                    <!-- EN Fields -->
                    <div id="tab-en" class="space-y-5 hidden">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nomi (EN)</label>
                            <input type="text" id="title_en"
                                class="w-full px-4 py-3 rounded-xl bg-gray-50 border-transparent focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 transition-all font-medium">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Tavsif (EN)</label>
                            <textarea id="description_en"
                                class="w-full px-4 py-3 rounded-xl bg-gray-50 border-transparent focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 transition-all h-24 resize-none leading-relaxed"></textarea>
                        </div>
                    </div>

                    <!-- Shared Config -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-gray-100">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Hujjat topshirish havolasi
                                (URL)</label>
                            <input type="url" id="apply_url"
                                class="w-full px-4 py-3 rounded-xl bg-gray-50 border-transparent focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 transition-all"
                                placeholder="Masalan: https://my.gov.uz/uz/service/...">
                            <p class="text-xs text-gray-500 mt-1.5">Bo'sh qoldirilsa, tugma chiqmaydi.</p>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Slug (URL)</label>
                            <input type="text" id="slug"
                                class="w-full px-4 py-3 rounded-xl bg-gray-50 border-transparent focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 transition-all"
                                required>
                            <p class="text-xs text-gray-500 mt-1.5">Avtomatik yoziladi, lekin o'zgartirish mumkin.</p>
                        </div>
                        <div class="flex items-center space-x-6 col-span-1 md:col-span-2">
                            <div class="w-1/2">
                                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Tartib Raqami</label>
                                <input type="number" id="order"
                                    class="w-full px-4 py-3 rounded-xl bg-gray-50 border-transparent focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 transition-all"
                                    value="0">
                            </div>
                            <div class="w-1/2 mt-6">
                                <label
                                    class="flex items-center cursor-pointer p-3 rounded-xl bg-blue-50/50 hover:bg-blue-50 transition-colors border border-blue-100 border-dashed">
                                    <input type="checkbox" id="is_new"
                                        class="w-5 h-5 text-blue-600 rounded border-blue-300 focus:ring-blue-500">
                                    <span class="ml-3 font-semibold text-blue-800">"Yangi" belgisi</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Medias -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-gray-100">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Rasm (Katta, 16:9)</label>
                            <input type="file" id="image"
                                class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Ikonka (Kichik kvadrat
                                rasm)</label>
                            <input type="file" id="icon"
                                class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-all">
                        </div>
                    </div>
                </form>
            </div>

            <div class="px-8 py-5 border-t border-gray-100 bg-gray-50/80 flex justify-end space-x-3">
                <button type="button" onclick="closeModal()"
                    class="px-6 py-2.5 rounded-xl text-gray-600 font-bold hover:bg-gray-200 transition-colors">Bekor
                    qilish</button>
                <button type="button" onclick="document.getElementById('field-form').requestSubmit()"
                    class="bg-blue-600 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-blue-700 shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5">Saqlash</button>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script src="js/fields.js"></script>
</body>

</html>
